user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # 禁用 IPv6 DNS 解析，仅使用 IPv4
    resolver 119.29.29.29 ipv6=off;

    # Gzip 压缩配置
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    server {
        listen 3004;
        server_name _;

        # 安全头设置
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # 前端静态文件
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # 缓存设置
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # AI 服务代理 - 对应前端 /v1/* 请求
        location /v1/ {
            proxy_pass https://toapis.com;
            proxy_set_header Host toapis.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 注意：API 密钥由前端通过 localStorage 动态传递，这里不再硬编码
            # 如果需要在这个层面添加密钥，可以使用环境变量
            # proxy_set_header Authorization 'Bearer $http_authorization';

            # 超时设置（用于长时间运行的请求，如视频生成）
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # 支持 SSE 流式响应
            proxy_buffering off;
            proxy_cache off;

            # 强制启用 SNI，防止部分服务端证书校验异常
            proxy_ssl_server_name on;
        }

        # ZeakAI (Midjourney) 服务代理 - 对应前端 /mj/* 请求
        location /mj/ {
            proxy_pass https://zeakai-api.api4midjourney.com;
            proxy_set_header Host zeakai-api.api4midjourney.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 注意：API 密钥由前端通过 localStorage 动态传递，这里不再硬编码

            # 超时设置
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # 支持 SSE 流式响应
            proxy_buffering off;
            proxy_cache off;

            # 强制启用 SNI，防止部分服务端证书校验异常
            proxy_ssl_server_name on;
        }

        # 健康检查
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
